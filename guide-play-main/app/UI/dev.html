      function getElementPosition(obj) {
        var curleft = 0,
          curtop = 0;
        if (obj.offsetParent) {
          do {
            curleft += obj.offsetLeft;
            curtop += obj.offsetTop;
          } while ((obj = obj.offsetParent));
          return { x: curleft, y: curtop };
        }
        return undefined;
      }

      function getEventLocation(element, event) {
        var pos = getElementPosition(element);

        return {
          x: event.pageX - pos.x,
          y: event.pageY - pos.y,
        };
      }

      function rgbToHex(r, g, b) {
        if (r > 255 || g > 255 || b > 255) throw "Invalid color component";
        return ((r << 16) | (g << 8) | b).toString(16);
      }
      function hsvToHex(h, s, v) {
        // max h = 180
        // max s = 255
        // max v = 255

        let h1 = h / 180;
        let s1 = s / 255;
        let v1 = v / 255;

        // convert hsv percentage to rgb
        let r, g, b;
        let i = Math.floor(h1 * 6);
        let f = h1 * 6 - i;
        let p = v1 * (1 - s1);
        let q = v1 * (1 - f * s1);
        let t = v1 * (1 - (1 - f) * s1);
        switch (i % 6) {
          case 0:
            (r = v1), (g = t), (b = p);
            break;
          case 1:
            (r = q), (g = v1), (b = p);
            break;
          case 2:
            (r = p), (g = v1), (b = t);
            break;
          case 3:
            (r = p), (g = q), (b = v1);
            break;
          case 4:
            (r = t), (g = p), (b = v1);
            break;
          case 5:
            (r = v1), (g = p), (b = q);
            break;
        }
        return (
          "#" +
          ("00" + Math.floor(r * 255).toString(16)).slice(-2) +
          ("00" + Math.floor(g * 255).toString(16)).slice(-2) +
          ("00" + Math.floor(b * 255).toString(16)).slice(-2)
        );
      }

      function hexToHSV(hex) {
        var r = parseInt(hex.slice(1, 3), 16) / 255,
          g = parseInt(hex.slice(3, 5), 16) / 255,
          b = parseInt(hex.slice(5, 7), 16) / 255;

        var max = Math.max(r, g, b),
          min = Math.min(r, g, b),
          d = max - min,
          h,
          s = max === 0 ? 0 : d / max,
          v = max;

        switch (max) {
          case min:
            h = 0;
            break;
          case r:
            h = (g - b) / d + (g < b ? 6 : 0);
            break;
          case g:
            h = (b - r) / d + 2;
            break;
          case b:
            h = (r - g) / d + 4;
            break;
        }

        h /= 6;

        return {
          h: h,
          s: s,
          v: v,
        };
      }

      function radianToDegree(radian) {
        return (radian * 180) / Math.PI;
      }
      function distanceFromPointToPoint(x1, y1, x2, y2) {
        return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
      }

      function setMapFromPosition(x, y, maxX, maxY, value) {
        const relX = Math.floor((x / maxX) * MAP_SIZE);
        const relY = Math.floor((y / maxY) * MAP_SIZE);
        const id = relX * MAP_SIZE + relY;

      var playerX = MAP_RANGE / 2 + 20;

          case 39:

            break; /* arrow right            */

            playerX = MAP_RANGE / 2 + 20;

            window.playerAngle = degreeToRadian(initialRotation);

        switch (event.keyCode) {

            playerMoveAngle = 0;

      // camera
      const DOUBLE_PI = 2 * Math.PI;
      const FOV = Math.PI / 3;
      const HALF_FOV = FOV / 2;
      const STEP_ANGLE = FOV / WIDTH;

      // graphics
      const WALLS = [];

      // load wall textures
      for (var filename = 0; filename < 14; filename++) {
        var image = document.createElement("img");
        image.src = "textures/" + filename + ".png";
        WALLS.push(image);
      }

      // game loop
      function gameLoop() {
        // calculate FPS
        cycleCount++;
        if (cycleCount >= 60) cycleCount = 0;
        var startTime = Date.now();
        var cycleTime = startTime - oldCycleTime;
        oldCycleTime = startTime;
        if (cycleCount % 60 == 0) fps_rate = Math.floor(1000 / cycleTime);

        // resize canvasRayCast
        canvasRayCast.width = window.innerWidth * 0.3;
        canvasRayCast.height = window.innerHeight * 0.3;

        // update player position
        var playerOffsetX = Math.sin(window.playerAngle) * MAP_SPEED;
        var playerOffsetY = Math.cos(window.playerAngle) * MAP_SPEED;
        var mapTargetX =
          Math.floor(playerY / MAP_SCALE) * MAP_SIZE +
          Math.floor((playerX + playerOffsetX * playerMoveX * 10) / MAP_SCALE);
        var mapTargetY =
          Math.floor((playerY + playerOffsetY * playerMoveY * 10) / MAP_SCALE) *
            MAP_SIZE +
          Math.floor(playerX / MAP_SCALE);

        if (playerMoveX && window.map[mapTargetX] == 0)
          playerX += playerOffsetX * playerMoveX;
        if (playerMoveY && window.map[mapTargetY] == 0)
          playerY += playerOffsetY * playerMoveY;
        if (playerMoveAngle) window.playerAngle += 0.03 * playerMoveAngle;

        // calculate map & player offsets
        let miniMapScale = 3;
        var mapOffsetX = Math.floor(canvasRayCast.width / 2) - HALF_WIDTH;
        var mapOffsetY = Math.floor(canvasRayCast.height / 2) - HALF_HEIGHT;
        var playerMapX = (playerX / MAP_SCALE) * miniMapScale + mapOffsetX;
        var playerMapY = (playerY / MAP_SCALE) * miniMapScale + mapOffsetY;

        // draw floor and ceiling
        context.drawImage(
          WALLS[0],
          canvasRayCast.width / 2 - HALF_WIDTH,
          canvasRayCast.height / 2 - HALF_HEIGHT
        );

        // raycasting
        var currentAngle = window.playerAngle + HALF_FOV;
        var rayStartX = Math.floor(playerX / MAP_SCALE) * MAP_SCALE;
        var rayStartY = Math.floor(playerY / MAP_SCALE) * MAP_SCALE;

        // loop over casted rays
        for (var ray = 0; ray < WIDTH; ray++) {
          // get current angle sin & cos
          var currentSin = Math.sin(currentAngle);
          currentSin = currentSin ? currentSin : 0.000001;
          var currentCos = Math.cos(currentAngle);
          currentCos = currentCos ? currentCos : 0.000001;

          // vertical line intersection
          var rayEndX,
            rayEndY,
            rayDirectionX,
            verticalDepth,
            textureEndY,
            textureY;
          if (currentSin > 0) {
            rayEndX = rayStartX + MAP_SCALE;
            rayDirectionX = 1;
          } else {
            rayEndX = rayStartX;
            rayDirectionX = -1;
          }
          for (var offset = 0; offset < MAP_RANGE; offset += MAP_SCALE) {
            verticalDepth = (rayEndX - playerX) / currentSin;
            rayEndY = playerY + verticalDepth * currentCos;
            var mapTargetX = Math.floor(rayEndX / MAP_SCALE);
            var mapTargetY = Math.floor(rayEndY / MAP_SCALE);
            if (currentSin <= 0) mapTargetX += rayDirectionX;
            var targetSquare = mapTargetY * MAP_SIZE + mapTargetX;
            if (targetSquare < 0 || targetSquare > map.length - 1) break;
            if (window.map[targetSquare] != 0) {
              textureY = window.map[targetSquare];
              if (window.map[targetSquare] == 14) textureY = 1;
              if (window.map[targetSquare] == 15) textureY = 5;
              break;
            }
            rayEndX += rayDirectionX * MAP_SCALE;
          }
          textureEndY = rayEndY;

          // vertical line intersection
          var rayEndY,
            rayEndX,
            rayDirectionY,
            horizontalDepth,
            textureEndX,
            textureX;
          if (currentCos > 0) {
            rayEndY = rayStartY + MAP_SCALE;
            rayDirectionY = 1;
          } else {
            rayEndY = rayStartY;
            rayDirectionY = -1;
          }
          for (var offset = 0; offset < MAP_RANGE; offset += MAP_SCALE) {
            horizontalDepth = (rayEndY - playerY) / currentCos;
            rayEndX = playerX + horizontalDepth * currentSin;
            var mapTargetX = Math.floor(rayEndX / MAP_SCALE);
            var mapTargetY = Math.floor(rayEndY / MAP_SCALE);
            if (currentCos <= 0) mapTargetY += rayDirectionY;
            var targetSquare = mapTargetY * MAP_SIZE + mapTargetX;
            if (targetSquare < 0 || targetSquare > map.length - 1) break;
            if (window.map[targetSquare] != 0) {
              textureX = window.map[targetSquare];
              if (window.map[targetSquare] == 14) textureX = 5;
              if (window.map[targetSquare] == 15) textureX = 1;
              break;
            }
            rayEndY += rayDirectionY * MAP_SCALE;
          }
          textureEndX = rayEndX;

          // calculate 3D projection
          var depth =
            verticalDepth < horizontalDepth ? verticalDepth : horizontalDepth;
          var textureImage =
            verticalDepth < horizontalDepth ? textureY : textureX;
          var textureOffset =
            verticalDepth < horizontalDepth ? textureEndY : textureEndX;
          textureOffset = Math.floor(
            textureOffset - Math.floor(textureOffset / MAP_SCALE) * MAP_SCALE
          );
          depth *= Math.cos(window.playerAngle - currentAngle);
          var wallHeight = Math.min(
            Math.floor((MAP_SCALE * 280) / (depth + 0.0001)),
            50000
          );

          // render textures
          try {
            var text = textureImage;
            if (textureImage > 13) text = 1;
            context.drawImage(
              WALLS[text],
              textureOffset /* source image X offset */,
              0 /* source image Y offset */,
              1 /* source image width    */,
              64 /* source image height   */,
              mapOffsetX + ray /* target image X offset */,
              mapOffsetY +
                (HALF_HEIGHT -
                  Math.floor(wallHeight / 2)) /* target image Y offset */,
              1 /* target image width    */,
              wallHeight /* target image height   */
            );
          } catch (e) {
            console.log(e);
          }

          // update current angle
          currentAngle -= STEP_ANGLE;
        }

        // draw map on left shift press
        if (showMap) {
          let distances = [];
          // clear map
          context.fillStyle = "#ffcc00";
          context.fillRect(
            mapOffsetX,
            mapOffsetY,
            MAP_SIZE * miniMapScale,
            MAP_SIZE * miniMapScale
          );

          // draw 2D map
          for (let row = 0; row < MAP_SIZE; row++) {
            for (let col = 0; col < MAP_SIZE; col++) {
              const square = row * MAP_SIZE + col;
              context.fillStyle = "#C0C0C0";
              context.fillRect(
                mapOffsetX + col * miniMapScale,
                mapOffsetY + row * miniMapScale,
                miniMapScale,
                miniMapScale
              );
              if (window.map[square] != 0) {
                // calculate dist from player
                const dist = distanceFromPointToPoint(
                  MAP_RANGE / 2,
                  MAP_RANGE / 2,
                  col * MAP_SCALE,
                  row * MAP_SCALE
                );
                distances.push({ dist, square, row, col });

                // draw walls

                const materialTexture =
                  window.map[square] > 13 ? 1 : window.map[square];
                context.drawImage(
                  WALLS[materialTexture],
                  0,
                  0,
                  MAP_SCALE / 2,
                  MAP_SCALE / 2,
                  mapOffsetX + col * miniMapScale,
                  mapOffsetY + row * miniMapScale,
                  miniMapScale,
                  miniMapScale
                );

                // sort by dist
                distances.sort((a, b) => a.dist - b.dist);
                let lineCoords = distances[0];
                // draw line from center

                context.beginPath();
                context.moveTo(playerMapX, playerMapY);
                context.lineTo(
                  mapOffsetX + lineCoords.col * miniMapScale,
                  mapOffsetY + lineCoords.row * miniMapScale
                );
                context.strokeStyle = "rgba(255, 0, 0, 0.5)";
                context.stroke();
              }
            }
          }

          // draw player on 2D map
          context.fillStyle = "Blue";
          context.beginPath();
          context.arc(playerMapX, playerMapY, 2, 0, DOUBLE_PI);
          context.fill();
          context.strokeStyle = "Blue";
          context.lineWidht = 1;
          context.beginPath();
          context.moveTo(playerMapX, playerMapY);
          context.lineTo(
            playerMapX + Math.sin(window.playerAngle) * miniMapScale,
            playerMapY + Math.cos(window.playerAngle) * miniMapScale
          );
          context.stroke();
        }

        // fix wall layout
        context.fillStyle = "White";
        context.fillRect(0, 0, canvasRayCast.width, mapOffsetY);
        context.fillRect(
          0,
          mapOffsetY + 200,
          canvasRayCast.width,
          canvasRayCast.width - mapOffsetY + 200
        );

        // infinite loop
        setTimeout(gameLoop, cycleDelay);

        // render FPS to screen
        context.fillStyle = "Black";
        context.font = "10px Monospace";
        context.fillText("FPS: " + fps_rate, 0, 20);
      }
      window.onload = function () {
        gameLoop();
