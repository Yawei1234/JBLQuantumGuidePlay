<!DOCTYPE html>
<html lang="en">
  <!-- Frame Header -->
  <head>
    <!-- Meta tags  -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />

    <title>Guide Play</title>
    <link rel="icon" type="image/png" href="images/favicon.png" />

    <!-- CSS Assets -->
    <link rel="stylesheet" href="css/app.css" />

    <!-- Javascript Assets -->
    <script src="js/app.js" defer></script>
    <script src="js/tailwind.js" defer></script>
    <script src="js/lottie-player.js"></script>
    <script src="js/htmx.min.js"></script>
    <script src="js/postme.js"></script>
    <script src="js/radarFunctions.js"></script>
    <script src="js/entities.js"></script>
    <!-- Fonts -->

    <script>
      /**
       * THIS SCRIPT REQUIRED FOR PREVENT FLICKERING IN SOME BROWSERS
       */
      // localStorage.getItem("_x_darkMode_on") === "true" &&

      // disable keypress f12
      document.addEventListener("keydown", (event) => {
        if (event.keyCode === 123) {
          event.preventDefault();
        }
      });

      // disable right mouse click
      document.addEventListener("contextmenu", (event) =>
        event.preventDefault()
      );
      window.addEventListener("load", () => {
        document.body.classList.add("loaded");
        document.addEventListener("contextmenu", (event) =>
          event.preventDefault()
        );
      });

      window.logEnabled = true;
      document.documentElement.classList.add("dark");
      window.showLog = (...args) => {
        if (window.logEnabled) {
          console.log(...args);
        }
      };
    </script>
    <style>
      html,
      body {
        background-color: black;
      }

      .pywebview-drag-region {
        -webkit-app-region: drag;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 40px;
        z-index: 999999;
      }
      .font-mono {
        font-family: monospace;
        color: #8a8a8a;
      }
    </style>
  </head>

  <body
    x-data
    x-bind="$store.global.documentBody"
    style="background-color: black"
    class="is-header-blur"
  >
    <!-- window handlers TOP -->
    <div class="pywebview-drag-region" id="wintophandlers"></div>

    <script>
      // get url Params
      const urlParams = new URLSearchParams(window.location.search);
      const devMode = urlParams.get("devMode");
      const devModeEnabled =
        devMode ? devMode.toLocaleLowerCase() === "true" : false;

      const initialState = {
        openDropTest: false,
        datamodel: [],
        wavs: [],
        inputStates: {},
        gamestate: "guideplay-ui",
        serviceStates: {
          "cv-fullcapture": false,
          "cv-radar": false,
          "cv-damage": false,
          "cv-obstacles": false,
          "cv-cardinal": false,
          "cv-theremin": false,
          "cv-aim": false,
        },
        currentTab: "AUDIO SETTINGS",
        tabs: [],
        tabIndexSub: 0,
        tabRootIndex: 0,
        tabIndexSubItem: 0,
        tabLocked: false,
        aboutSelected: false,
        modalLocked: true,
        showModal: false,
        devMode: devModeEnabled,
      };

      window.services = {};

      window.addEventListener("DOMContentLoaded", () => {
        window.showLog("STARTING ALPINE");

        setTimeout(() => {
          window.setStateJSON(initialState);
          Alpine.start();
        }, 200);
        // pywebview.api.syncState("bootUp", "true");
        setTimeout(() => {
          document.querySelector(".app-preloader").remove();
        }, 1000);
      });

      window.setTab = (e, tab) => {
        const current = window.Alpine.store("global")["tabRootIndex"];
        if (current === tab) {
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        // const newTabIndexSub = tab.split("-")[0];
        // const newTabIndexSubItem = tab.split("-")[1];

        // const currentTabIndexSub = window.Alpine.store("global")["tabIndexSub"];
        // const currentTabIndexSubItem =
        //   window.Alpine.store("global")["tabIndexSubItem"];

        // if (
        //   newTabIndexSub == currentTabIndexSub &&
        //   newTabIndexSubItem == currentTabIndexSubItem
        // ) {
        //   e.preventDefault();
        //   e.stopPropagation();
        //   return;
        // }
        window.showLog("SETTING_TAB", tab);
        pywebview.api.syncState("tabIndex", tab);
      };
      window.changeTab = (tab) => {
        window.showLog("CHANGING_TAB", tab);
        const tabIndex = window.Alpine.store("global")["tabs"].indexOf(tab);
        pywebview.api.syncState("menuTab", tab);
        pywebview.api.syncState("rootTabIndex", tabIndex);

        window.setState("tabIndexSub", 0);
        window.setState("tabIndexSubItem", 0);
        pywebview.api.updateSubItemTab(
          window.Alpine.store("global")["currentTab"],
          "reset"
        );
        window.updateMenuItemProps(tab);
        // set focus
        window.setState("tabLocked", true);
        window.setTimeout(() => {
          // document.getElementById("menu-" + tab).focus();
          window.setState("tabLocked", false);
        }, 500);

        // window.Alpine.store('global')["currentTab"] = tab
      };
      window.cycleTab = (direction) => {
        window.showLog("CYCLING_TAB", direction);
        const tabs = window.Alpine.store("global")["tabs"];
        const currentTab = window.Alpine.store("global")["currentTab"];
        const currentIndex = tabs.indexOf(currentTab);
        if (direction === "prev") {
          const prevIndex =
            currentIndex - 1 < 0 ? tabs.length - 1 : currentIndex - 1;
          window.showLog("PREV_INDEX", prevIndex);
          window.changeTab(tabs[prevIndex]);
          // set focus

          window.setState("tabLocked", true);
          window.setTimeout(() => {
            document.getElementById("menu-" + tabs[prevIndex]).focus();
            window.setState("tabLocked", false);
          }, 500);
          return;
        }
        if (window.Alpine.store("global")["tabLocked"]) {
          // window.setState("tabLocked", false)
          return;
        }
        const nextIndex =
          currentIndex + 1 >= tabs.length ? 0 : currentIndex + 1;
        window.showLog("NEXT_INDEX", nextIndex);
        window.changeTab(tabs[nextIndex]);
        window.setTimeout(() => {
          document.getElementById("menu-" + tabs[nextIndex]).focus();
        }, 500);
      };
      window.updateMenuItemProps = (id) => {
        window.showLog("UPDATING_MENU_ITEM_PROPS", "menu-" + id);

        if (document.getElementById("menu-" + id) === null) {
          return;
        }

        window.Alpine.store("global")
          ["tabs"].filter((tab) => tab !== id)
          .forEach((tab) => {
            const el = document.getElementById("menu-" + tab);

            if (el === null) {
              return;
            }

            el.removeAttribute("activated");
            el.setAttribute("role", "presentation");
            el.setAttribute("tabIndex", "-1");
          });

        document
          .getElementById("menu-" + id)
          .setAttribute(
            "activated",
            window.Alpine.store("global")["currentTab"]
          );
        document.getElementById("menu-" + id).setAttribute("role", "button");
        document.getElementById("menu-" + id).setAttribute("tabIndex", "0");
      };
      window.getRole = (tab, type) => {
        if (type == "role") {
          return tab == window.Alpine.store("global")["currentTab"]
            ? "button"
            : "presentation";
        }
        if (type == "tabIndex") {
          return tab == window.Alpine.store("global")["currentTab"]
            ? "0"
            : "-1";
        }
        if (type == "activate") {
          return tab == window.Alpine.store("global")["currentTab"]
            ? window.Alpine.store("global")["currentTab"]
            : "null";
        }
      };
      window.cycleSubItem = (e, direction) => {
        if (window.Alpine.store("global")["tabLocked"]) {
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        window.showLog("CYCLING_SUBITEM", e, direction);
        // const element = document.activeElement;
        // window.showLog("ACTIVE ELEMENT", element.tagName);
        // if (element.tagName == "LI") {
        //   window.showLog(
        //     "ACTIVE ELEMENT ACTIVATED",
        //     element.getAttribute("activated")
        //   );

        // if (
        //   element.getAttribute("activated") &&
        //   element.getAttribute("activated") ===
        //     window.Alpine.store("global")["currentTab"]
        // ) {
        // e.preventDefault();
        // e.stopPropagation();
        window.showLog("CYCLING_SUBITEM_PYTHON", e, direction);

        window.setState("tabLocked", true);
        window.setTimeout(() => {
          window.setState("tabLocked", false);
        }, 500);
        pywebview.api.updateSubItemTab(
          window.Alpine.store("global")["currentTab"],
          direction
        );
        // }
      };
      // };
      window.treatValue = (value, type) => {
        window.showLog("TREATING_VALUE", value, type);
        if (value && value.length > 0 && type == "wav") {
          let wavs = window.Alpine.store("global")["wavs"];
          let index = wavs.findIndex((item) => item.file === value);
          if (index >= 0) {
            // return wavs[index].name;
            return `Sound ${index + 1}`;
          }
          return value.split(".")[0] || value;
        }
        return value;
      };

      window.toggleCombo = (id) => {
        const toggled =
          !window.Alpine.store("global")["inputStates"]["" + id + ""];
        window.Alpine.store("global")["inputStates"]["" + id + ""] = toggled;
        window.showLog("TOGGLING_COMBO", id, toggled);
      };
      // set state on store
      window.setState = (key, value) => {
        newValue = value;

        if (key == "devMode") {
          window.showLog("DEV_MODE", value);
          window.Alpine.store("global")["devMode"] = value;
          return;
        }

        if (key == "lockModal") {
          window.showLog("LOCK_MODAL", value);
          window.Alpine.store("global")["modalLocked"] = true;
          return;
        }
        if (key == "unlockModal") {
          window.showLog("UNLOCK_MODAL", value);
          window.Alpine.store("global")["modalLocked"] = false;
          return;
        }

        if (key == "showModal") {
          window.showLog("SHOW_MODAL", value);
          window.Alpine.store("global")[key] = true;
          window.Alpine.store("global")["modalLocked"] = true;
          return;
        }
        if (key == "hideModal") {
          window.showLog("SHOW_MODAL", value);

          window.Alpine.store("global")["modalLocked"] = false;

          if (document.getElementById("fake-modal-close")) {
            document.getElementById("fake-modal-close").click();
          }
          window.Alpine.store("global")[key] = false;
          return;
        }
        if (key == "notification") {
          $notification({ content: "#custom-html-notif", duration: 6000 }),
            pywebview.api.notidata();
          return;
        }

        if (key === "wavs" && typeof value === "string" && value.length > 0) {
          newValue = JSON.parse(value).map((item, index) => {
            return {
              // name: item.split(".")[0],
              name: `Sound ${index + 1}`,
              file: item,
            };
          });
        }

        if (key === "tabs" && typeof value === "string" && value.length > 0) {
          newValue = JSON.parse(value);
        }
        if (
          key === "tabIndexSub" ||
          key == "tabIndexSubItem" ||
          key == "tabRootIndex"
        ) {
          window.showLog("FIRE_SETTING_TAB_INDEX", key, value);

          if (key == "tabRootIndex") {
            // find element by index and scroll to it
            const elementsList = window.generateTabsIndex();
            const element = elementsList.find(
              (item) => item.index === parseInt(value)
            );
            if (element) {
              window.showLog("ELEMENT_FOUND", key, value, element);

              document.getElementById(element.id).scrollIntoView({
                behavior: "smooth",
                block: "center",
                inline: "nearest",
              });

              // element.element.scrollIntoView({
              //   behavior: "smooth",
              //   block: "center",
              //   inline: "nearest",
              // });

              setTimeout(() => {
                document.getElementById(element.id).focus();
              }, 300);
            } else {
              window.showLog("ELEMENT_NOT_FOUND", key, value);
            }
          }
          // // document.getElementById("content-frame").scrollTo(0, 200, true)
          // if (
          //   key === "tabIndexSub" &&
          //   document.getElementById("audioItem-" + value)
          // ) {
          //   document.getElementById("audioItem-" + value).scrollIntoView({
          //     behavior: "smooth",
          //     block: "center",
          //     inline: "nearest",
          //   });
          // }
          // if (
          //   key === "tabIndexSubItem" &&
          //   document.getElementById(
          //     "audioSubItem-" +
          //       window.Alpine.store("global")["tabIndexSub"] +
          //       "-" +
          //       value +
          //       ""
          //   )
          // ) {
          //   document
          //     .getElementById(
          //       "audioSubItem-" +
          //         window.Alpine.store("global")["tabIndexSub"] +
          //         "-" +
          //         value +
          //         ""
          //     )
          //     .scrollIntoView({
          //       behavior: "smooth",
          //       block: "center",
          //       inline: "nearest",
          //     });
          // }

          newValue = parseInt(value);
        }

        window.showLog("SETTING_STATE", key, newValue);
        window.Alpine.store("global")[key] = newValue;
      };
      window.checkConfigByKey = (key, subkey) => {
        if (window.Alpine.store("global")["datamodel"]) {
          const configItem = window.Alpine.store("global")["datamodel"].find(
            (item) => item.id === key
          );
          if (configItem) {
            const subItem = configItem.subitems.find(
              (subitem) => subitem.id === subkey
            );
            if (subItem && subItem.value === "on") {
              return true;
            } else if (subItem && subItem.value === "off") {
              return false;
            } else {
              return subItem.value;
            }
          } else {
            return ["not-found-1", key, subkey];
          }
        } else {
          return ["not-found-2", key, subkey];
        }
      };

      window.generateTabsIndex = (refresh = false) => {
        if (!refresh && window.cachedIndexes) {
          return window.cachedIndexes;
        }

        let indexes = [];
        document.querySelectorAll(".tabbed").forEach((item) => {
          // get in line styles
          let styles = window.getComputedStyle(item);
          // check if display none
          let classes = styles.getPropertyValue("display");
          // if no display none
          if (!classes.includes("none")) {
            indexes.push({
              index: parseInt(item.getAttribute("index")),
              id: item.getAttribute("id"),
              element: item,
            });
          }
        });

        // sorte indexes
        indexes.sort((a, b) => a.index - b.index);

        window.showLog("INDEXES", indexes);
        window.cachedIndexes = indexes;

        return indexes;
      };
      window.setStateJSON = (json, key) => {
        let model = json;
        // window.showLog("setStateJSON", key, model);

        if (key && key === "gamestate") {
          const extras = json.extras;
          // window.showLog("setStateJSON_GAMESTATE", extras);

          window.Alpine.store("global")["gamestate"] =
            json.gamestate || "unknown-ui";

          let element = document.getElementById("gameStateSlot");
          let elementContainer = document.getElementById(
            "gameplay-details-container"
          );
          if (element) {
            element.innerHTML = "";
            element.innerHTML = json.gamestate || "unknown-ui";
          }
          if (elementContainer) {
            elementContainer.innerHTML = "";
            elementContainer.innerHTML = Object.keys(extras)
              .map((Subkey) => {
                return `<div class="flex flex-col gameplay-details-item font-mono text-gray-600">
                          <div class="w-full flex flex-wrap">
                            <div class="gameplay-details-item-Subkey pr-2 font-bold">${Subkey}</div>
                            <div class="gameplay-details-item-value">${extras[Subkey]}</div>
                          </div>
                        </div>`;
              })
              .join("");
          }

          return;
        }

        if (key && key === "roundstate") {
          const extras = json.extras;
          // window.showLog("setStateJSON_ROUNDSTATE", extras);

          window.Alpine.store("global")["roundstate"] =
            json.roundstate || "unknown-ui";

          let element = document.getElementById("roundStateSlot");
          let elementContainer = document.getElementById(
            "roundplay-details-container"
          );
          if (element) {
            element.innerHTML = "";
            element.innerHTML = json.roundstate || "unknown-ui";
          }
          if (elementContainer) {
            elementContainer.innerHTML = "";
            elementContainer.innerHTML = Object.keys(extras)
              .map((Subkey) => {
                let value = extras[Subkey];

                if (
                  Subkey === "lastDamageAngle" &&
                  value !== "0" &&
                  value !== null &&
                  value !== undefined
                ) {
                  // {
                  //     "name": "top",
                  //     "angle": 0,
                  //     "whitePixels": 2531,
                  //     "percentage": 1,
                  //     "class": "damage",
                  //     "id": "top",
                  //     "uniqueId": "top",
                  //     "w": 20,
                  //     "h": 20,
                  //     "x": 0,
                  //     "y": 500,
                  //     "px": 0,
                  //     "py": 500,
                  //     "closest": false,
                  //     "index": -1,
                  //     "dist": 500,
                  //     "silence": -1,
                  //     "angleP": 0,
                  //     "timestamp": 1706633221219
                  // }
                  if (value.timestamp && value.timestamp > 0) {
                    const now = new Date().getTime();
                    const diff = now - value.timestamp;
                    if (diff < 1000) {
                      const refKey = `cv-damage-damage`;
                      // check if emission is enable on datamodel

                      const isDamageAlertEnabled = window.checkConfigByKey(
                        "IncomingDamageDirection",
                        "DamageDirectionAlerts"
                      );

                      if (
                        isDamageAlertEnabled &&
                        window.services[refKey] &&
                        window.services[refKey]["updater"]
                      ) {
                        window.services[refKey]["remoteHandle"].call(
                          "updateRadarEmitter",
                          JSON.stringify(value)
                        );
                        // window.showLog("AIM_DAMAGE_RECEIVED_____", value);
                      } else {
                        // window.showLog("AIM_DAMAGE_NOTFOUND", refKey);
                      }

                      const date = new Date(value.timestamp);
                      const format = `${date.getHours()}:${date.getMinutes()}:${date.getSeconds()}`;

                      value = `x_${value.x}_y${value.y}_a${value.angle}° @ ${format}`;
                    } else {
                      value = "damage-expired";
                    }
                  }
                }
                return `<div class="flex flex-col roundplay-details-item font-mono text-gray-600">
                          <div class="w-full flex flex-wrap">
                            <div class="roundplay-details-item-Subkey pr-2 font-bold">${Subkey}</div>
                            <div class="roundplay-details-item-value">${value}</div>
                          </div>
                        </div>`;
              })
              .join("");
          }

          return;
        }

        if (key && key === "aim") {
          model = JSON.stringify(json);
          // already stringified

          const isAimEnabled = window.checkConfigByKey(
            "AimAlerts",
            "AimAlertsAlerts"
          );

          if (!isAimEnabled) {
            // window.showLog("AIM_REJECTING", isAimEnabled);
            return;
          }

          if (
            window.services["aim-enemy"] &&
            window.services["aim-enemy"]["updater"]
          ) {
            window.services["aim-enemy"]["remoteHandle"].call(
              "updateAimEmitter",
              model
            );
          }
          return;
        }

        if (key && key === "aimplus") {
          model = JSON.stringify(json);
          // already stringified

          const isAimEnabled = window.checkConfigByKey(
            "AimAlerts",
            "AimAlertsAlerts"
          );

          if (!isAimEnabled) {
            // window.showLog("AIM_REJECTING", isAimEnabled);
            return;
          }

          if (
            window.services["aim-plus"] &&
            window.services["aim-plus"]["updater"]
          ) {
            window.services["aim-plus"]["remoteHandle"].call(
              "updateAimEmitter",
              model
            );
          }
          return;
        }

        if (key && key === "aim_damage") {
          model = json;

          const refKey = `cv-damage-damage`;
          // check if emission is enable on datamodel

          const isDamageAlertEnabled = window.checkConfigByKey(
            "IncomingDamageDirection",
            "DamageDirectionAlerts"
          );

          if (!isDamageAlertEnabled) {
            // window.showLog("AIM_DAMAGE_REJECTING", isDamageAlertEnabled, model);
            return;
          }
          // window.showLog("AIM_DAMAGE_RECEIVED_____", model);

          if (window.services[refKey] && window.services[refKey]["updater"]) {
            window.services[refKey]["remoteHandle"].call(
              "updateRadarEmitter",
              JSON.stringify(model)
            );
          } else {
            // window.showLog("AIM_DAMAGE_NOTFOUND", refKey);
          }

          // if (window.services["radar"] && window.services["radar"]["updater"]) {
          //   window.services["radar"]["updater"]("setDataModel", JSON.stringify(model));
          // }
          return;
        }

        if (key && key === "obstacles") {
          model = json;

          const refKey = `cv-obstacles-obstacles`;
          // check if emission is enable on datamodel

          const isEnvAlertsEnabled = window.checkConfigByKey(
            "EnvironmentNavigation",
            "EnvironmentAlerts"
          );

          if (!isEnvAlertsEnabled) {
            // window.showLog("OBSTACLES_REJECTING", isEnvAlertsEnabled, model);
            return;
          }
          window.showLog("OBSTACLES_RECEIVED_____", model);

          model.forEach((item) => {
            if (window.services[refKey] && window.services[refKey]["updater"]) {
              const content = JSON.stringify(item);
              window.showLog("OBSTACLES_EMITTING", refKey, content);
              // alert("TRACKEDS_EMITTING: " + refKey + " " + content);
              window.services[refKey]["remoteHandle"].call(
                "updateRadarEmitter",
                content
              );
            }
          });

          return;
        }

        if (key && key === "trackeds") {
          model = json;

          // parsed income

          // {
          //     "id": "76_enemy_x-26_y-72_t1705290217.4191132",
          //     "uniqueId": 0,
          //     "w": 10,
          //     "h": 10,
          //     "x": 149,
          //     "y": 247,
          //     "angle": -70.14478563067895,
          //     "closest": true,
          //     "index": -1,
          //     "dist": 76,
          //     "class": "enemy",
          //     "silence": 0.7,
          //     "color": [
          //         255,
          //         0,
          //         255
          //     ]
          // }

          model.forEach((item) => {
            const refKey = `cv-radar-${item.class}`;
            // check if emission is enable on datamodel

            const isFriendEnabled = window.checkConfigByKey(
              "TeamProximity",
              "TeamProximityAlerts"
            );
            const isEnemyEnabled = window.checkConfigByKey(
              "EnemyProximity",
              "EnemyProximityAlerts"
            );

            if (item.class === "friend" && !isFriendEnabled) {
              // window.showLog("TRACKEDS_REJECTING_FRIEND", isFriendEnabled);
              return;
            }
            if (item.class === "enemy" && !isEnemyEnabled) {
              // window.showLog("TRACKEDS_REJECTING_ENEMY", isEnemyEnabled);
              return;
            }

            if (window.services[refKey] && window.services[refKey]["updater"]) {
              const content = JSON.stringify(item);
              window.showLog("TRACKEDS_EMITTING", refKey, content);
              // alert("TRACKEDS_EMITTING: " + refKey + " " + content);
              window.services[refKey]["remoteHandle"].call(
                "updateRadarEmitter",
                content
              );
            }
          });

          // if (window.services["radar"] && window.services["radar"]["updater"]) {
          //   window.services["radar"]["updater"]("setDataModel", JSON.stringify(model));
          // }
          return;
        }

        if (key && key === "serviceStates") {
          model = json;

          window.Alpine.store("global")["serviceStates"] = {
            ...window.Alpine.store("global")["serviceStates"],
            ...model,
          };

          // window.showLog(

                itemElement.click();

                window.showLog("COMBO_TRIGGERED", direction);
                let list = itemElement.children[1].children;
                let button = itemElement.children[0].children[0];

                window.showLog("COMBO_TRIGGERED", list, button, buttonText);

                let wavs = window.Alpine.store("global")["wavs"];
                // find index of current value
                let currentIndex = wavs.findIndex(
                  (item) => item.name === buttonText
                );

                let newIndex = 0;
                if (direction === "plus") {
                  newIndex =
                    currentIndex + 1 >= wavs.length ? 0 : currentIndex + 1;
                } else {
                  newIndex =
                    currentIndex - 1 < 0 ? wavs.length - 1 : currentIndex - 1;
                }

                let audioItemId = realId.split("-")[0];
                let audioSubItemId = realId.split("-")[1];

                let audioItem = window.Alpine.store("global")["datamodel"].find(
                  (item) => item.id === audioItemId

                  (item) => item.id === audioSubItemId

                  subItem.id,
                  subItem.title,
                  wavs[newIndex].file,

                    "ITEM_ID",
                    item.id.replace("" + realId + "-" + type + "-", "")

                }

                if (direction === "minus") {

                  setTimeout(() => {
                    // itemElement.blur();

                    const currentTab =
                      window.Alpine.store("global")["currentTab"];
                    const currentIndex = tabs.indexOf(currentTab);
                    window.showLog("BLURRING", currentTab, currentIndex);

                    // document.getElementById("menu-" + currentTab + "").focus();
                  }, 500);
                  return;
                }
                return;
              }
              if (type === "rate") {

                  "" + realId + "-" + type + ""

                const minusElement = document.getElementById(
                  "" + realId + "-" + type + "-minus"

                const plusElement = document.getElementById(
                  "" + realId + "-" + type + "-plus"

                  if (direction === "plus") {
                    plusElement.click();

                  }
                  if (direction === "minus") {
                    minusElement.click();
                    window.showLog("RATE_TRIGGERED_NEW_VALUE_MINUS");
                  }

                /*

                setTimeout(() => {

                  const tabs = window.Alpine.store("global")["tabs"];
                  const currentTab =

                  const currentIndex = tabs.indexOf(currentTab);

                    */

              },

              },

      window.mainComponent = (ref) => {
        window.sideBarLocked = false;

          rightPressed: false,
          leftPressed: false,
          upPressed: false,
          downPressed: false,
          init: function () {
            window.showLog("master_key", "init", ref);
            // alert("master_key");

            document.addEventListener(
              "keydown",
              (e) => this.keyDownHandler(e),
              false
            );
            document.addEventListener(
              "keyup",
              (e) => this.keyUpHandler(e),
              false
            );
          },
          keyUpHandler(e) {
            e.preventDefault();
            e.stopPropagation();

            window.showLog("master_key_up", e.key); // login the key down event

            // alert("master_key, keyUpHandler", e.key);
            if (e.key == "Right" || e.key == "ArrowRight") {
              this.rightPressed = false;
            } else if (e.key == "Left" || e.key == "ArrowLeft") {
              this.leftPressed = false;
            } else if (e.key == "Up" || e.key == "ArrowUp") {
              this.upPressed = false;
            } else if (e.key == "Down" || e.key == "ArrowDown") {
              this.downPressed = false;
            }
          },
          keyDownHandler(e) {
            window.showLog("master_key_down", e.key); // login the key down event
            // alert("master_key", e.key);

            // keypress period
            if (e.altKey && e.key === "h") {
              e.preventDefault();
              e.stopPropagation();
              const btToggler = document.getElementById("right-sidebar-toggle");
              if (btToggler && !window.sideBarLocked) {
                btToggler.click();
                window.sideBarLocked = true;
              }
              setTimeout(() => {
                window.sideBarLocked = false;
              }, 1000);
              return;
            }

            // if alt + f4 = close
            if (e.altKey && e.key === "F4") {
              e.preventDefault();
              e.stopPropagation();

              pywebview.api.topbar("close");
              pywebview.api.syncState(
                "askSay",
                "Closing Guide Play. Good bye!"
              );

              // window.close();
              return;
            }

            // if ctrl + tab = next
            if (!e.shiftKey && e.ctrlKey && e.key === "Tab") {
              e.preventDefault();
              e.stopPropagation();
              window.cycleTab("next");

              // remove class
              const element = document.getElementById("about-body");
              if (element) {
                element.classList.remove(
                  "active",
                  "border-2",
                  "border-yellow-100"
                );
                // remove atrribute
                element.setAttribute("role", "presentation");
                element.blur();
              }

              return;
            }
            // if ctrl + shift + tab = prev
            if (e.ctrlKey && e.shiftKey && e.key === "Tab") {
              e.preventDefault();
              e.stopPropagation();
              window.cycleTab("prev");

              // remove class
              const element = document.getElementById("about-body");
              if (element) {
                element.classList.remove(
                  "active",
                  "border-2",
                  "border-yellow-100"
                );
                // remove atrribute
                element.setAttribute("role", "presentation");
                element.blur();
              }
              return;
            }

            // window.Alpine.store("global")["currentTab"]
            const currentTab = window.Alpine.store("global")["currentTab"];
            if (currentTab == "ABOUT") {
              if (e.shiftKey && e.key == "Tab") {
                // remove class
                const element = document.getElementById("about-body");
                if (element) {
                  element.classList.remove(
                    "active",
                    "border-2",
                    "border-yellow-100"
                  );
                  // remove atrribute
                  element.setAttribute("role", "presentation");
                  element.blur();
                }
              }

              if (!e.shiftKey && e.key === "Tab") {
                e.preventDefault();
                e.stopPropagation();
                let currentState =
                  window.Alpine.store("global")["aboutSelected"];

                if (currentState === true) {
                  currentState = false;
                } else {
                  currentState = true;
                }

                window.Alpine.store("global")["aboutSelected"] = currentState;

                if (currentState) {
                  const element = document.getElementById("about-body");
                  if (element) {
                    // set atrribute
                    element.setAttribute("role", "button");
                    // add class
                    element.classList.add(
                      "active",
                      "border-2",
                      "border-yellow-100"
                    );
                    element.focus();
                    const text = element.textContent;
                    // remove double spaces
                    const cleanText = text
                      .replace(/\s+/g, " ")
                      .replace(/\n/g, " ")
                      .replace(/\t/g, " ");

                    pywebview.api.syncState("askSay", cleanText);
                  }
                }

                return;
              }
            }

            if (currentTab == "AUDIO SETTINGS") {
              window.showLog("master_key_down", "AUDIO SETTINGS", e.key);
              // if tab cycleSubItem = next
              if (!e.shiftKey && e.key === "Tab") {
                e.preventDefault();
                e.stopPropagation();
                window.cycleSubItem(e, "next");
                return;
              }
              // if shift + tab cycleSubItem = prev
              if (e.shiftKey && e.key === "Tab") {
                e.preventDefault();
                e.stopPropagation();
                window.cycleSubItem(e, "prev");
                return;
              }

              const currentRootIndex = parseInt(
                window.Alpine.store("global")["tabRootIndex"]
              );

              const elementsList = window.generateTabsIndex();
              const currentElement = elementsList.find(
                (item) => item.index === currentRootIndex
              );

              if (!currentElement) {
                e.preventDefault();
                e.stopPropagation();
                window.showLog("ELEMENT__NOTFOUND", currentRootIndex);
                return;
              }

              const currentElementIndex = parseInt(
                currentElement.element.getAttribute("index")
              );

              window.showLog(
                "ELEMENT__FOUND",
                currentRootIndex,
                currentElementIndex,
                currentElement.element.getAttribute("id")
              );

              if (currentElementIndex !== currentRootIndex) {
                e.preventDefault();
                e.stopPropagation();
                window.showLog(
                  "ELEMENT__INDEX__MISMATCH",
                  currentElementIndex,
                  currentRootIndex
                );
                return;
              }

              if (e.key == "Right" || e.key == "ArrowRight") {
                window.triggerKey(currentElement.element, "plus");
                // stop propagation
                e.preventDefault();
                e.stopPropagation();
                this.rightPressed = true;
              } else if (e.key == "Left" || e.key == "ArrowLeft") {
                window.triggerKey(currentElement.element, "minus");
                e.preventDefault();
                e.stopPropagation();
                this.leftPressed = true;
              } else if (e.key == "Up" || e.key == "ArrowUp") {
                window.triggerKey(currentElement.element, "plus");
                e.preventDefault();
                e.stopPropagation();
                this.upPressed = true;
              } else if (e.key == "Down" || e.key == "ArrowDown") {
                window.triggerKey(currentElement.element, "minus");
                e.preventDefault();
                e.stopPropagation();
                this.downPressed = true;
              }
            } else {
              window.showLog(
                "master_key_down",
                "NOT AUDIO SETTINGS",
                currentTab
              );
            }

            e.preventDefault();
            e.stopPropagation();
          },
          devMode: Alpine.store("global")["devMode"],
        };
      };

      window.settingsComponent = () => {
        return {
          started: true,
          devMode: Alpine.store("global")["devMode"],
        };
      };
    </script>
