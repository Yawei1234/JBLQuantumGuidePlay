<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>RadarEmitter</title>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <meta http-equiv="Cache-control" content="no-cache" />

    <script src="../js/webcomponents-bundle.js"></script>
    <script src="../js/tailwind.js"></script>
    <script src="../js/radarFunctions.js"></script>
    <script src="../js/Tone.js"></script>
    <script src="../js/tone-ui.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/postme.js"></script>
    <script src="../js/entities.js"></script>
    <script src="../js/joystick-controller.min.js"></script>

    <style type="text/css">
      tone-play-toggle {
        margin-bottom: 10px;
      }
      body {
        background-color: #000;
        font-family: monospace;
      }
      .blinkTarget {
        transform: translateX(50%), translateY(50%);
        border: 1px solid rgb(155, 155, 155);
      }
      .trackTarget {
        transform: translateX(50%), translateY(50%);
      }

      .font-mono {
        font-family: monospace;
        color: #8a8a8a;
      }
    </style>
  </head>
  <body>
    <div
      class="select-none w-full bg-gray-800 rounded flex justify-center items-center justify-center overflow-hidden"
    >
      <div
        style="width: 200px; height: 200px; transform: scale(0.9)"
        class="bg-gray-700 rounded relative"
      >
        <div
          style="width: 200px; height: 200px"
          id="joy_container"
          class="absolute top-0 left-0 z-10"
        >
          <div
            style="width: 200px; height: 200px"
            id="joy"
            class="absolute"
          ></div>
        </div>

        <div
          id="trackedID"
          class="select-none top-0 left-0 w-full overflow-hidden absolute font-mono text-xs truncate ..."
        >
          #
        </div>
        <div
          style="width: 200px; height: 200px; transform: translate(50%, 50%)"
          class="relative -mt-2 -ml-2 absolute top-0 left-0"
        >
          <div
            id="blinkTarget"
            class="blinkTarget w-4 h-4 rounded-full bg-red-400 absolute top-0 left-0 z-20"
          ></div>
          <div
            id="trackTarget"
            class="trackTarget w-4 h-4 rounded-full bg-gray-300 absolute top-0 left-0 z-10"
          ></div>
        </div>
      </div>
    </div>
    <div
      class="select-none w-full bg-black text-white rounded flex justify-center items-center justify-center overflow-hidden truncate ..."
    >
      <span id="logCarto" class="font-mono text-xs"
        >x_0_y_0_dist_0_silence_0</span
      >
      <span id="logBlink" class="font-mono mx-4 text-xs">0102</span>
    </div>
    <div
      style="height: 50px"
      id="logRaw"
      class="w-full bg-gray-700 text-white font-mono text-xs overflow-hidden select-none"
    >
      []
    </div>
    <div
      class="w-full flex flex-col bg-gray-800 text-white font-mono text-xs overflow-hidden"
    >
      <input
        id="JoyMultiplierRange"
        class="hidden"
        type="range"
        id="JoyMultiplier"
        name="JoyMultiplier"
        min="0"
        max="100"
      />
      <input
        id="JoyMaxRadiusRange"
        class="hidden"
        type="range"
        id="JoyMaxRadius"
        name="JoyMaxRadius"
        min="0"
        max="640"
      />
    </div>
    <div id="content">
      <tone-loader></tone-loader>
    </div>

    <script>
      JoystickController = JoystickController.default;
    </script>

    <script type="text/javascript">
      const output = document.getElementById("logRaw");
      const messageInput = document.getElementById("message");
      const sendButton = document.getElementById("logRaw");

      // receive query string params
      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString);
      const trackerID = urlParams.get("id");
      const devModeParam = urlParams.get("devMode");
      const isDevMode = devModeParam == "true" ? true : false;

      const JoyMultiplierRange = document.getElementById("JoyMultiplierRange");
      JoyMultiplierRange.addEventListener("input", (e) => {
        window.JoyMultiplier = parseInt(e.target.value);
      });

      window.JoyMaxRadius = 120;
      window.JoyMultiplier = 20;

      const JoyMaxRadiusRange = document.getElementById("JoyMaxRadiusRange");
      JoyMaxRadiusRange.addEventListener("input", (e) => {
        window.JoyMaxRadius = parseInt(e.target.value);
      });

      const x = document.querySelector("#x");
      const y = document.querySelector("#y");
      const xLeveled = document.querySelector("#xLeveled");
      const yLeveled = document.querySelector("#yLeveled");
      const distance = document.querySelector("#distance");
      const angle = document.querySelector("#angle");

      const x2 = document.querySelector("#x2");
      const y2 = document.querySelector("#y2");
      const xLeveled2 = document.querySelector("#xLeveled2");
      const yLeveled2 = document.querySelector("#yLeveled2");
      const distance2 = document.querySelector("#distance2");
      const angle2 = document.querySelector("#angle2");

      const ParentHandshake = PostMe.ParentHandshake;
      const ChildHandshake = PostMe.ChildHandshake;

      // For safety it is strongly adviced to pass the explicit child origin instead of '*'
      const messenger = new PostMe.WindowMessenger({
        localWindow: window,
        remoteWindow: window.parent,
        remoteOrigin: "*",
      });

      window.connected = null;
      window.remoteHandle = null;
      window.localHandle = null;

      window.showLog = (e, ...args) => {
        // to-do select the specific log topics
        return;
        console.log("EMMITER_LOGGER", e, ...args);
        if (window.remoteHandle) {
          window.remoteHandle
            .call(
              "emitLog",
              JSON.stringify({
                trackerID,
                ...args,
              })
            )
            .then((result) => {
              // alert("emitLog___"+result);
              console.info("emitLog___" + result);
            })
            .catch((err) => {
              // alert("emitLog___err"+err);
              console.info("emitLog___err", err);
            });
        }
      };

      const globalCartX = 0;
      const globalCartY = 0;
      const globalSilence = 0.3;
      const globalMultipliterValue = 100;
      const divider = 300;
      const maxRadius = 600;
      const maxBPM = parseInt(window.entities[trackerID].maxBPM) || 360;

      window.trackeds = [];
      window.radarState = [];
      window.dataModel = null;

      const blinkTarget = document.getElementById("blinkTarget");
      const logBlink = document.getElementById("logBlink");
      const trackTarget = document.getElementById("trackTarget");
      const logCarto = document.getElementById("logCarto");
      const logRaw = document.getElementById("logRaw");
      const trackedID = document.getElementById("trackedID");

      if (!isDevMode) {
        document.getElementById("JoyMultiplierRange").classList.add("hidden");
        document.getElementById("JoyMaxRadiusRange").classList.add("hidden");
        logRaw.classList.add("hidden");
      }

      window.appendLog = (e) => {
        let oldContent = logRaw.innerHTML.split("<br>");
        // slice 3 last
        oldContent = oldContent.slice(0, 3);
        logRaw.innerHTML = e + "<br>" + oldContent.join("<br>");
      };

      let lastDataReceived = -1;
      let lastProcess = -1;

      let refreshLoopInterval = null;

      trackedID.addEventListener("click", () => {
        refreshLoop();
      });

      blinkTarget.addEventListener("click", () => {
        refreshComp();
      });

      // refreshComp();

      const startSocket = () => {
        const socket = new WebSocket("ws://localhost:8899");

        socket.onopen = () => {
          output.innerHTML += "<p>Connected to the server.</p>";
        };

        socket.onmessage = (event) => {
          output.innerHTML += `<p>Server says: ${event.data}</p>`;
        };

        socket.onclose = () => {
          output.innerHTML += "<p>Connection closed.</p>";
        };

        sendButton.addEventListener("click", () => {
          const message = `Hello from the client! ${new Date().toISOString()}`;
          socket.send(message);
          output.innerHTML += `<p>You say: ${message}</p>`;
        });
      };

      const refreshComp = () => {
        window.showLog("RADAR_EMITTER: refresh");
        const refKey = `radar-${trackerID}`;
        window.remoteHandle.call("restart", refKey).then((result) => {
          // alert("RADAR_EMITTER: restart");
          window.showLog("RADAR_EMITTER: restart", result);
        });
        setTimeout(() => {
          window.location.reload(true);
        }, 500);
      };

      const refreshLoop = () => {
        Object.keys(window.entities).forEach((key) => {
          const entitie = window.entities[key];
          if (entitie.loop) {
            window.showLog("REFRESHING_LOOP", entitie.class);
            entitie.loop.stop();
            entitie.loop = null;
            entitie.loop = createLoop(entitie);
            entitie.loop.start(0);
          }
        });
      };

      refreshLoopInterval = setInterval(() => {
        refreshLoop();
      }, 5000);

      class EntitiePoint {
        constructor(
          x,
          y,
          px,
          py,
          dist,
          angle,
          angleP,
          silence,
          className,
          id = String(new Date().getTime())
        ) {
          this.x = x;
          this.y = y;
          this.px = px;
          this.py = py;
          this.height = 10;
          this.width = 10;
          this.angle = angle;
          this.angleP = angleP;
          this.dist = dist;
          this.silence = silence;
          this.className = className;
          this.id = id;
        }

        get area() {
          return this.calcArea();
        }
        calcArea() {
          return this.height * this.width;
        }
        distance(a, b) {
          const dx = a.x - b.x;
          const dy = a.y - b.y;

          return Math.hypot(dx, dy);
        }
      }

      // iterate window.radarState and create classes
      const createEntitiePoints = () => {
        const entitiePoints = window.radarState.map((e) => {
          const entitiePoint = new EntitiePoint(
            e.x,
            e.y,
            e.px,
            e.py,
            e.dist,
            e.angle,
            e.angleP,
            e.silence,
            e.className || e.class,
            e.minDistance || -1,
            e.maxDistance || -1,
            e.id
          );
          return entitiePoint;
        });
        return entitiePoints;
      };

      function getLoopInterval(silence) {
        let newinterval = "8n";
        if (silence > 0.6) {
          newinterval = "8m";
        } else if (silence > 0.5) {
          newinterval = "9m";
        } else if (silence > 0.4) {
          newinterval = "10n";
        } else if (silence > 0.3) {
          newinterval = "12n";
        } else if (silence > 0.2) {
          newinterval = "14n";
        } else if (silence > 0.1) {
          newinterval = "16n";
        } else if (silence > 0.01) {
          newinterval = "16n";
        }
        return newinterval;
      }

      function setBPMSpeed(silence) {
        let newBPM = maxBPM / 2;

        let silenceTreated = silence > 1 ? 1 : silence;
        let maxSilence = silenceTreated - 0.1;
        // let invertedSilence = 1- maxSilence;
        let calc = maxSilence;
        newBPM = maxBPM / 2 - calc * 100;
        window.showLog("setBPMSpeed", calc, newBPM);
        Tone.Transport.bpm.value = newBPM > 0 ? newBPM : 0;
      }
      function setLoopInterval(loop, player, silence) {
        // silence = 0 - 1

        let silenceTreated = silence > 1 ? 1 : silence;
        let maxDelay = 4;
        let maxSilence = silenceTreated - 0.1;
        let invertedSilence = 1 - maxSilence;
        let calc = invertedSilence * maxDelay;
        loop.playbackRate = calc;

        logBlink.innerHTML = `${calc.toFixed(4)}__${silence.toFixed(2)}`;
      }

      function blink() {
        blinkTarget.style.opacity = 1;
        setTimeout(() => {
          blinkTarget.style.opacity = 0;
        }, 10);
      }
      function setSpatial(panner, nx = null, ny = null, nz = null) {
        const newValues = {
          x: nx ? parseFloat(nx) : panner.get().positionX,
          y: ny ? parseFloat(ny) : panner.get().positionY,
          z: nz ? parseFloat(nz) : panner.get().positionZ,
        };

        panner.setPosition(newValues.x, newValues.y, newValues.z);
      }

      const plotEntities = () => {
        window.trackeds.forEach((e) => {
          const entitie = window.entities[e.className];
          if (!entitie) return;
          const x = (e.px / maxRadius) * 100;
          const y = (e.py / maxRadius) * 100;
          // invert y
          const ny = y * -1;

          trackTarget.style.opacity = 0.1;

          trackTarget.style.left = `${Math.round(x)}px`;
          trackTarget.style.top = `${Math.round(ny)}px`;

          // append logRaw
          window.appendLog(
            `[${window.radarState.length}]_px_${e.px.toFixed(
              2
            )}_py_${e.py.toFixed(2)}_d_${e.dist.toFixed(
              3
            )}_s_${e.silence.toFixed(3)}_a_${e.angle}_ap_${e.angleP || "*"}`
          );
          //
        });
      };

      const createLoop = (entitie) => {
        const loop = new Tone.Loop(function (time) {
          window.showLog(
            "TONE_LOOP_0",
            time,
            entitie.class,
            window.trackeds,
            window.radarState
          );

          const tracks = window.trackeds.filter(
            (e) => e.className == entitie.class
          );

          if (tracks.length == 0) return;

          window.showLog("TONE_LOOP_1", time, entitie.class);

          // find the shortest dist
          const entitiePoint = tracks.reduce((prev, curr) => {
            return prev.dist < curr.dist ? prev : curr;
          });

          window.showLog("TONE_LOOP_02", time, entitie.class, entitiePoint);

          if (!entitiePoint) return;

          let pointX = entitiePoint.px / divider;
          let pointY = entitiePoint.py / divider;

          Tone.Draw.schedule(() => {
            blink();
            logCarto.innerHTML = `[${
              window.radarState.length
            }]_x_${pointX.toFixed(2)}_y_${pointY.toFixed(
              2
            )}_d_${entitiePoint.dist.toFixed(
              3
            )}_s_${entitiePoint.silence.toFixed(3)}`;
            blinkTarget.style.backgroundColor = heatMapColorforValue(
              1 - entitiePoint.dist / maxRadius
            );
            // ${ entitiePoint.id }
            trackedID.innerHTML = `${trackerID}_bpm_${parseInt(
              Tone.Transport.bpm.value
            ).toFixed(1)}`;

            // window.showLog("newValues", newValues)

            let x = ((pointX * divider) / maxRadius) * 100;
            let y = ((pointY * divider) / maxRadius) * 100;
            // invert y
            y = y * -1;

            blinkTarget.style.left = `${Math.round(x)}px`;
            blinkTarget.style.top = `${Math.round(y)}px`;
          }, time);

          // generateBeepSound();
          // setLoopInterval(
          //   entitie.loop,
          //   entitie.player,
          //   entitiePoint.silence
          // );
          setBPMSpeed(entitiePoint.silence);
          setSpatial(entitie.panner, pointX, pointY, 0);

          // remove from window.trackeds
          setTimeout(() => {
            window.trackeds = window.trackeds.filter(
              (e) => e.id != entitiePoint.id
            );
            window.radarState = window.radarState.filter(
              (e) => e.id != entitiePoint.id
            );
          }, 1000);
          // window.trackeds = window.trackeds.filter(
          //   (e) => e.id != entitiePoint.id
          // );
          // window.radarState = window.radarState.filter(
          //   (e) => e.id != entitiePoint.id
          // );

          // if (entitie.player.state == "started") {
          //     entitie.player.stop(time);
          // }
          // if player ended, restart
          if (entitie.player.state == "stopped") {
            entitie.player.start(0);
          } else {
            entitie.player.restart(time);
            lastProcess = new Date().getTime();
          }

          // entitie.player.restart(time);
        }, "12n");
        return loop;
      };
      const updateEntitieLoops = () => {
        return new Promise((resolve, reject) => {
          Object.keys(window.entities).forEach((key) => {
            const entitie = window.entities[key];
            if (entitie.loop == null) {
              entitie.loop = createLoop(entitie);
              entitie.loop.start(0);
            }
          });

          resolve(true);
        });
      };

      const updateEntitiePlayers = () => {
        return new Promise((resolve, reject) => {
          Object.keys(window.entities).forEach((key) => {
            const entitie = window.entities[key];
            if (entitie.player == null) {
              entitie.player = new Tone.Player({
                url: `/sounds/${entitie.wav}`,
                loop: false,
              })
                .connect(entitie.panner)
                .sync();
              // convert percent 0-100 to debibel
              const volume = Tone.gainToDb(parseFloat(entitie.volume * 0.01));
              entitie.player.volume.value = volume;
            } else {
              // update player
              entitie.player.load(`/sounds/${entitie.wav}`);
              const volume = Tone.gainToDb(parseFloat(entitie.volume * 0.01));
              entitie.player.volume.value = volume;
            }
          });

          resolve(true);
        });
      };

      const updateEntitiePanners = () => {
        return new Promise((resolve, reject) => {
          Object.keys(window.entities).forEach((key) => {
            const entitie = window.entities[key];
            if (entitie.panner == null) {
              entitie.panner = new Tone.Panner3D({
                panningModel: "HRTF",
                positionX: 0,
                positionY: 0,
                positionZ: 0,
              }).toDestination();
            }
          });
          resolve(true);
        });
      };

      const updateEntitieBuffers = () => {
        return new Promise((resolve, reject) => {
          Object.keys(window.entities).forEach((key) => {
            const entitie = window.entities[key];
            if (entitie.wav == null) return;
            if (entitie.buffer == null) {
              window.showLog(
                "RADAR_EMITTER_UPDATING_BUFFER_01",
                entitie.wav,
                entitie.class
              );
              entitie.buffer = new Tone.ToneAudioBuffer(
                `/sounds/${entitie.wav}`,
                () => {
                  window.showLog(
                    "RADAR_EMITTER_TONE_BUFFER_01_loaded",
                    entitie.wav,
                    entitie.class
                  );
                }
              );
            } else {
              // update buffer
              window.showLog(
                "RADAR_EMITTER_UPDATING_BUFFER_02",
                entitie.wav,
                entitie.class
              );
              entitie.buffer.load(`/sounds/${entitie.wav}`, () => {
                window.showLog(
                  "RADAR_EMITTER_TONE_BUFFER_02_loaded",
                  entitie.wav,
                  entitie.class
                );
              });
            }
          });

          resolve(true);
        });
      };

      const updateEntities = () => {
        return new Promise((resolve, reject) => {
          if (window.dataModel && window.dataModel.length > 0) {
            const TeamProximity = window.dataModel.find(
              (e) => e.id == "TeamProximity"
            );
            const EnemyProximity = window.dataModel.find(
              (e) => e.id == "EnemyProximity"
            );
            const EnvironmentNavigation = window.dataModel.find(
              (e) => e.id == "EnvironmentNavigation"
            );
            const IncomingDamageDirection = window.dataModel.find(
              (e) => e.id == "IncomingDamageDirection"
            );

            // WAV FILES
            const IncomingDamageDirectionWAV =
              IncomingDamageDirection.subitems.find((e) => e.id == "SfxSelect");

            if (IncomingDamageDirectionWAV) {
              window.entities.damage.wav = IncomingDamageDirectionWAV.value;
            }
            const TeamProximityWAV = TeamProximity.subitems.find(
              (e) => e.id == "SfxSelect"
            );
            if (TeamProximityWAV) {
              window.entities.friend.wav = TeamProximityWAV.value;
            }
            const EnemyProximityWAV = EnemyProximity.subitems.find(
              (e) => e.id == "SfxSelect"
            );
            if (EnemyProximityWAV) {
              window.entities.enemy.wav = EnemyProximityWAV.value;
            }
            const EnvironmentNavigationWAV =
              EnvironmentNavigation.subitems.find((e) => e.id == "SfxSelect");
            if (EnvironmentNavigationWAV) {
              window.entities.obstacles.wav = EnvironmentNavigationWAV.value;
            }

            // VOLUMS
            // WAV FILES
            const TeamProximityVOL = TeamProximity.subitems.find(
              (e) => e.id == "SfxVolume"
            );
            if (TeamProximityVOL) {
              window.entities.friend.volume = TeamProximityVOL.value;
            }
            const EnemyProximityVOL = EnemyProximity.subitems.find(
              (e) => e.id == "SfxVolume"
            );
            if (EnemyProximityVOL) {
              window.entities.enemy.volume = EnemyProximityVOL.value;
            }
            const EnvironmentNavigationVOL =
              EnvironmentNavigation.subitems.find((e) => e.id == "SfxVolume");
            if (EnvironmentNavigationVOL) {
              window.entities.obstacles.volume = EnvironmentNavigationVOL.value;
            }
            const IncomingDamageDirectionVOL =
              IncomingDamageDirection.subitems.find((e) => e.id == "SfxVolume");
            if (IncomingDamageDirectionVOL) {
              window.entities.damage.volume = IncomingDamageDirectionVOL.value;
            }
          }

          resolve(true);
        });
      };

      const parseDataModel = async (e, id, callback = null) => {
        const parse = JSON.parse(e);
        // window.showLog("RADAR_EMITTER: parseDataModel", parse);
        window.dataModel = parse;
        if (window.dataModel.length == 0) {
          // window.showLog("RADAR_EMITTER: parseDataModel", "NO_DATA_MODEL");
          // retry in 1 second
          setTimeout(() => {
            // window.showLog(
            //   "RADAR_EMITTER: parseDataModel",
            //   "RETRYING_IN_1_SECOND"
            // );
            getDataModel(init);
          }, 1000);
          return;
        }
        let results = [];
        results.push(await updateEntities());
        results.push(await updateEntitieBuffers());
        results.push(await updateEntitiePanners());
        results.push(await updateEntitiePlayers());
        results.push(await updateEntitieLoops());

        const isAnyFalse = results.some((e) => e == false);
        // if not false, callback
        if (!isAnyFalse) {
          if (callback) callback();
        } else {
          // if any false, try again
          window.showLog("PARSE_FAILED_TRY_AGAIN");
          setTimeout(() => {
            parseDataModel(e, trackerID, callback);
          }, 1000);
        }
      };

      const init = () => {
        Tone.context.updateInterval = 0.005;
        Tone.Transport.bpm.value = maxBPM;

        setTimeout(() => {
          window.trackeds = createEntitiePoints();
          Tone.Transport.start();
        }, 1000);
      };
      const getTag = (id) => {
        let tag = "TeamProximity";
        if (id == "enemy") tag = "EnemyProximity";
        if (id == "obstacles") tag = "EnvironmentNavigation";
        if (id == "damage") tag = "IncomingDamageDirection";
        if (id == "friend") tag = "TeamProximity";
        return tag;
      };

      const getDataModel = (callback) => {
        if (!window.connected) return;
        let dataModelTag = getTag(trackerID);

        window.remoteHandle
          .call("getDataModel", dataModelTag)
          .then((result) => {
            // window.showLog("RADAR_EMITTER: getDataModel", result);

            parseDataModel(result, trackerID, callback);
          });
      };
      let healthTimeOut = null;
      const healthCheck = (nowIncome) => {
        let now = new Date().getTime();
        if (nowIncome) {
          now = nowIncome;
        }
        // window.showLog(
        //   "RADAR_EMITTER: healthCheck",
        //   now,
        //   lastDataReceived,
        //   lastProcess
        // );

        if (lastDataReceived == -1) {
          lastDataReceived = now;
        }

        if (lastProcess > 0) {
          let diffProcess = now - lastProcess;

          let diffFromReceived = lastProcess - lastDataReceived;

          if (window.trackeds.length > 0 && diffFromReceived > 1000) {
            window.showLog(
              "RADAR_EMITTER: healthCheck",
              "NO_TRACKEDS",
              diffProcess
            );
            refreshComp();
          }
        }

        clearTimeout(healthTimeOut);
        healthTimeOut = setTimeout(() => {
          healthCheck(null);
        }, 1000);
      };

      const model = {
        updateRadarEmitter: function (e) {
          console.log("TRACKEDS_RADAR_EMITTER: updateRadarEmitter", e);

          const parse = JSON.parse(e);
          // window.showLog("TRACKEDS_RADAR_EMITTER: updateRadarEmitter", parse);

          // healthCheck(new Date().getTime());
          // append parse
          // window.radarState.push(parse);
          // if (window.radarState.length == 0) {
          window.radarState = [parse];

          // window.showLog(
          //   "TRACKEDS_RADAR_EMITTER_LENGTH",
          //   window.radarState.length
          // );
          // }
          // // slice max 5 of each class
          // const filteredClass = window.radarState.filter((e) => e.className == parse.className).slice(-5);
          // // append filteredClass
          // window.radarState = window.radarState.filter((e) => e.className != parse.className).concat(filteredClass);

          window.trackeds = createEntitiePoints();

          plotEntities();
          // window.showLog("ENTITIES_POINTS_TRACKEDS", window.trackeds)
        },
        setDataModel: function (e) {
          window.showLog("RADAR_EMITTER: setDataModel", e);
          parseDataModel(e, trackerID, null);
        },
        refresh: refreshComp,
      };

      PostMe.ChildHandshake(messenger, model).then((connection) => {
        // connection is an instance of Connection
        window.connected = connection;
        window.showLog("RADAR_EMITER Handshake complete", connection);

        window.remoteHandle = connection.remoteHandle();
        window.localHandle = connection.localHandle();

        // countSpan.innerHTML = count.toString();
        window.remoteHandle.addEventListener("ping", function () {
          // ("RADAR_EMITER Received ping event");
          window.showLog("RADAR_EMITER Received ping event");
        });

        setTimeout(() => {
          getDataModel(init);
        }, 1000);
      });

      // mouse click event
      window.mouseClicked = false;
      document.addEventListener("click", (e) => {
        // if (e.target.id == "joy") {
        //   // window.showLog("RADAR_EMITTER: joy", e);
        //   // refreshComp();
        // }
        window.mouseClicked = true;
      });

      const leftJoystick = new JoystickController(
        {
          x: "50%",
          y: "63%",
          opacity: 0.1,
          maxRange: 100,
          radius: 60,
          joystickRadius: 40,
          joystickClass: "joystick",
          distortion: false,
          mouseClickButton: "ALL",
          hideContextMenu: true,
        },
        (data) => {
          let positions = {
            x: data.x * window.JoyMultiplier,
            y: data.y * window.JoyMultiplier,
          };

          /* MODEL
        {
          "name": "bottom",
          "angle": 180,
          "whitePixels": 2676,
          "percentage": 0.9812981298129813,
          "class": "damage",
          "id": "bottom",
          "uniqueId": "bottom",
          "w": 20,
          "h": 20,
          "x": 0,
          "y": -500,
          "px": 0,
          "py": -500,
          "closest": false,
          "index": -1,
          "dist": 500,
          "silence": 1.8,
          "angleP": 0,
          "timestamp": 1710497752393
        } */

          const maxDist = window.JoyMaxRadius;
          // xLeveled.innerHTML = data.leveledX;
          // yLeveled.innerHTML = data.leveledY;
          let distance = parseFloat(data.distance);
          let angle = data.angle;
          let silence = 0.1 + distance / maxDist;
          // window.joystickHandlers.leftJoystickHandler.x = data.leveledX
          // window.joystickHandlers.leftJoystickHandler.y = data.leveledY

          const fakeInput = {
            name: trackerID,
            angle: 180,
            whitePixels: 2676,
            percentage: 0.9812981298129813,
            class: trackerID,
            id: new Date().getTime(),
            uniqueId: new Date().getTime(),
            w: 20,
            h: 20,
            x: positions.x,
            y: positions.y,
            px: positions.x,
            py: positions.y,
            closest: false,
            index: -1,
            dist: distance,
            silence: silence,
            angleP: 0,
            timestamp: new Date().getTime(),
          };
          if (window.mouseClicked) {
            model.updateRadarEmitter(JSON.stringify(fakeInput));

            let logTxt = `x_${positions.x.toFixed(2)}_y_${positions.y.toFixed(
              2
            )}_d_${distance.toFixed(3)}_s_${silence.toFixed(3)}`;
            window.appendLog(logTxt);
          }
        }
      );
    </script>
  </body>
