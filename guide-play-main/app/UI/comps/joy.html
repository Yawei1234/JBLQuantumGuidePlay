<html>
  <head>
    <title>Joy</title>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Example page of use pure Javascript JoyStick"
    />
    <meta name="author" content="Roberto D'Amico" />
    <link
      rel="shortcut icon"
      type="image/png"
      href="https://bobboteck.github.io/img/roberto-damico-bobboteck.png"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0px;
        padding: 0px;
        font-family: monospace;
        background-color: #626262;
      }
      .row {
        display: inline-flex;
        clear: both;
      }
      .columnLateral {
        float: left;
        width: 15%;
        min-width: 300px;
      }
      .columnCetral {
        float: left;
        width: 70%;
        min-width: 300px;
      }

      #joy1Div {
        background-color: rgb(131 131 131);
        border-radius: 3%;
        padding: 10px;
        width: 220px;
        height: 220px;
      }
      #joy2Div {
        background-color: rgb(131 131 131);
        border-radius: 3%;
        padding: 10px;
        width: 220px;
        height: 220px;
      }
      .joyBlinker {
        top: -230px;
        height: 20px;
        width: 20px;
      }
      .cursor {
        cursor: crosshair;
      }
      .detailsBox {
        height: 40px;
      }
    </style>
    <script src="../js/joy.js"></script>
    <script src="../js/radarFunctions.js"></script>
    <script src="../js/tailwind.js"></script>
    <script src="../js/postme.js"></script>
    <script src="../js/Tone.js"></script>
  </head>
  <body>
    <!-- Example of two JoyStick integrated in the page structure -->
    <div class="cursor w-full flex flex-wrap pt-4">
      <div
        class="flex-1 -mt-4 px-12 flex flex-col items-center justify-center select-none"
      >
        <div
          class="my-4 border-1 border-black"
          id="joy1Div"
          style="width: 220px; height: 220px"
        ></div>

        <div class="w-full relative h-0">
          <div
            id="joy1Blink"
            style="background-color: #ff0000"
            class="absolute joyBlinker"
          ></div>
        </div>

        <div class="w-full detailsBox -mt-2">
          <div class="w-full flex flex-wrap -mt-2 rounded">
            <div id="joy1PosizioneX"></div>
            <div id="joy1PosizioneY"></div>
            <div id="joy1Direzione"></div>
            <div id="joy1X"></div>
            <div id="joy1Y"></div>
          </div>
          <div
            id="joy1Details"
            class="w-full flex flex-wrap -mt-2 rounded"
          ></div>
        </div>
      </div>
      <div
        class="flex-1 -mt-4 px-12 flex flex-col items-center justify-center select-none"
      >
        <div
          class="my-4 border-1 border-black"
          id="joy2Div"
          style="width: 220px; height: 220px"
        ></div>

        <div class="w-full relative h-0">
          <div
            id="joy2Blink"
            style="background-color: #0000ff"
            class="absolute joyBlinker"
          ></div>
        </div>

        <div class="w-full detailsBox -mt-2">
          <div class="w-full flex flex-wrap -mt-2 rounded">
            <div id="joy2PosizioneX"></div>
            <div id="joy2PosizioneY"></div>
            <div id="joy2Direzione"></div>
            <div id="joy2X"></div>
            <div id="joy2Y"></div>
          </div>

          <div
            id="joy2Details"
            class="w-full flex flex-wrap -mt-2 rounded"
          ></div>
        </div>
      </div>
    </div>
    <script type="text/javascript">
      const ParentHandshake = PostMe.ParentHandshake;
      const ChildHandshake = PostMe.ChildHandshake;

      // For safety it is strongly adviced to pass the explicit child origin instead of '*'
      const messenger = new PostMe.WindowMessenger({
        localWindow: window,
        remoteWindow: window.parent,
        remoteOrigin: "*",
      });

      let connected = null;
      let remoteHandle = null;
      let localHandle = null;
      const maxDist = 600;

      // console.log('Child: Waiting for handshake from parent...');
      // console.log("Child: messenger", messenger)
      // console.log("Child: localWindow", window)
      // console.log("Child: remoteWindow", window.parent)

      // "_a"+calculateAngleCartesian(0,0, state.posX, state.posY).toFixed(3)+""

      function joyUpdater(id, state) {
        const found = JOY_MASTER.find((element) => element.id === id);
        if (!found) return;
        found.state = state;
        found.elements.InputPosX.innerHTML = "cX_" + state.posX;
        found.elements.InputPosY.innerHTML = "cY_" + state.posY;
        found.elements.Direzione.innerHTML = "C_" + state.dir;
        found.elements.X.innerHTML = "x_" + state.x;
        found.elements.Y.innerHTML = "y_" + state.y;
        found.elements.Details.innerHTML =
          "" +
          (state.pressed ? "p" : "") +
          "_d" +
          calculateDistanceCartesian(0, 0, state.x, state.y).toFixed(3) +
          "_g" +
          calculateAngleCartesian(0, 0, state.posX, state.posY).toFixed(3) +
          "_s_" +
          getSilence(state.x, state.y).toFixed(3) +
          "_v_" +
          getVolume(state.x, state.y).toFixed(3) +
          "";
      }
      function joyGetter(id) {
        const found = JOY_MASTER.find((element) => element.id === id);
        if (!found) return;
        return found.state;
      }

      const JOY_MASTER = [
        {
          id: "joy1",
          state: {
            id: "joy1",
            x: 0,
            y: 0,
            dir: 0,
            posX: 0,
            posY: 0,
            dist: 0,
            class: "enemy",
            pressed: false,
          },
          engine: null,
          interval: null,
          color: "#FF0000",
          colorLight: "#920B0B",
          elements: {
            InputPosX: document.getElementById("joy1PosizioneX"),
            InputPosY: document.getElementById("joy1PosizioneY"),
            Details: document.getElementById("joy1Details"),
            Direzione: document.getElementById("joy1Direzione"),
            X: document.getElementById("joy1X"),
            Y: document.getElementById("joy1Y"),
          },
          updateState: joyUpdater,
          getState: joyGetter,
          lastState: "",
        },
        {
          id: "joy2",
          state: {
            id: "joy2",
            x: 0,
            y: 0,
            dir: 0,
            posX: 0,
            posY: 0,
            dist: 0,
            class: "friend",
            pressed: false,
          },
          engine: null,
          interval: null,
          color: "#0000FF",
          colorLight: "#00FFFF",
          elements: {
            InputPosX: document.getElementById("joy2PosizioneX"),
            InputPosY: document.getElementById("joy2PosizioneY"),
            Details: document.getElementById("joy2Details"),
            Direzione: document.getElementById("joy2Direzione"),
            X: document.getElementById("joy2X"),
            Y: document.getElementById("joy2Y"),
          },
          updateState: joyUpdater,
          getState: joyGetter,
          lastState: "",
        },
      ];

      let model = {
        getLastJoy1: function () {
          const found = JOY_MASTER.find((element) => element.id === "joy1");
          if (!found) return;
          return found.lastState;
        },
        getLastJoy2: function () {
          const found = JOY_MASTER.find((element) => element.id === "joy2");
          if (!found) return;
          return found.lastState;
        },
      };

      PostMe.ChildHandshake(messenger, model).then((connection) => {
        // connection is an instance of Connection
        connected = connection;
        // console.log("Child: Handshake complete", connection);
        messenger.postMessage("Hello from child!");

        remoteHandle = connection.remoteHandle();
        localHandle = connection.localHandle();

        var count = 0;
        // countSpan.innerHTML = count.toString();
        remoteHandle.addEventListener("ping", function () {
          count += 1;
          //   console.log("Child: Received ping event", count);
        });

        remoteHandle.addEventListener("joy1info", function (e) {
          //   console.log("Child: Received joy1info event", e);
        });

        remoteHandle.addEventListener("joy2info", function (e) {
          //   console.log("Child: Received joy21info event", e);
        });
      });

      let sendJoyState = (id) => {
        if (!connected) return;

        const found = JOY_MASTER.find((element) => element.id === id);

        if (!found) return;

        let stateSTR = JSON.stringify(found.getState(id));

        // if (found && localHandle && found.lastState !== stateSTR) {
        found.lastState = stateSTR;
        remoteHandle.call("setJoyModel", found.lastState);
        // console.log("call: setJoyModel", found.lastState)
        // }
      };

      let refreshJoyState = (id) => {
        // console.log("REFRESHING", id)
        const found = JOY_MASTER.find((element) => element.id === id);

        if (!found) return;

        let JOY_ID = found.engine;

        let model = {
          x: JOY_ID.GetX(),
          y: JOY_ID.GetY(),
          dir: JOY_ID.GetDir(),
          posX: JOY_ID.GetPosX(),
          posY: JOY_ID.GetPosY(),
          dist: JOY_ID.GetDist(),
          class: found.state.class,
          pressed: JOY_ID.GetPressed(),
        };

        if (JOY_ID.GetPressed()) {
          found.updateState(id, model);
          sendJoyState(id);
        }
      };

      JOY_MASTER.forEach((joy) => {
        console.log("STARTING JOY", joy.id);

        joy["engine"] = new JoyStick("" + joy.id + "Div", {
          width: 200,
          height: 200,
          title: joy.id,
          internalFillColor: joy.color,
          internalStrokeColor: joy.colorLight,
          externalStrokeColor: joy.colorLight,
          autoReturnToCenter: false,
          externalLineWidth: 2,
        });

        joy["interval"] = setInterval(() => {
          refreshJoyState(joy.id);
        }, 100);
      });

      const synth = new Tone.Synth({
        oscillator: {
          type: "fmsine4",
          modulationType: "square",
        },
      }).toDestination();

      const loop = new Tone.Pattern(
        (time, note) => {
          synth.triggerAttackRelease(note, "16n", time);

          // Draw.schedule takes a callback and a time to invoke the callback
          Tone.Draw.schedule(() => {
            // the callback synced to the animation frame at the given time
            const noteElement = document.querySelector("#" + note);
            noteElement.classList.add("active");
            setTimeout(() => {
              noteElement.classList.remove("active");
            }, 100);
          }, time);
        },
        ["C4", "E4", "G4", "B4", "D5"]
      ).start(0);

      loop.interval = "16n";
    </script>
  </body>
</html>
